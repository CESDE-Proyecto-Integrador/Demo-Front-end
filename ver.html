<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentoPro - Ver Registro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f6f6f8; } </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card border-0 shadow-sm rounded-4 p-5 text-center" style="max-width: 400px;">
        <span class="material-symbols-outlined fs-1 text-info mb-3">visibility</span>
        <h4 class="fw-bold">Detalle del Registro</h4>
        <p class="text-muted small">Visualización detallada de la información seleccionada.</p>
        <button class="btn btn-outline-info fw-bold mt-3 d-flex align-items-center justify-content-center gap-2" onclick="history.back()">
            <span class="material-symbols-outlined fs-5">arrow_back</span>
            Regresar
        </button>
    </div>
</body>
</html>
